# https://cert-manager.io/docs/configuration/acme/
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: hostmaster@devops.coop

    # Default profile is "classic", but cert-manager docs uses tlsserver, which reflects "the latest recommendations from the CA/Browser Forum Baseline Requirements, as well as general trends within the WebPKI community."
    # https://cert-manager.io/docs/configuration/acme/#acme-certificate-profiles
    # https://letsencrypt.org/docs/profiles/#tlsserver
    profile: tlsserver

    # Let's Encrypt's prod server
    # https://letsencrypt.org/getting-started/#selecting-and-operating-an-acme-client-yourself
    server: https://acme-v02.api.letsencrypt.org/directory

    # This is supposed to have a default of "tls.key", but apparently that doesn't work, because I get this error when I don't specify it:
    #
    # $ k get ks -n flux-system cert-manager-custom-resources
    # NAME                            AGE   READY   STATUS
    # cert-manager-custom-resources   64m   False   ClusterIssuer/cert-manager/letsencrypt dry-run failed (Invalid): ClusterIssuer.cert-manager.io "letsencrypt" is invalid: spec.acme.privateKeySecretRef: Required value...
    #
    # https://github.com/cert-manager/cert-manager/issues/7845
    privateKeySecretRef:
      name: tls.key

    solvers:

      # Use this for ingress-nginx
      # - http01:
      #     ingress:
      #       ingressClassName: nginx

      # Envoy Gateway HTTP01 solver
      # https://gateway.envoyproxy.io/latest/tasks/security/tls-cert-manager/
      - http01:
          gatewayHTTPRoute:
            parentRefs:
            - kind: Gateway
              name: eg
              namespace: envoy-gateway-system

              # Add this to fix:
              #   Warning  PresentError  103s                  cert-manager-challenges  Error presenting challenge: HTTPRoute.gateway.networking.k8s.io "cm-acme-http-solver-kzs9j" is invalid: spec.parentRefs: Invalid value: "array": sectionName must be unique when parentRefs includes 2 or more references to the same parent
              sectionName: http

      # Cloudflare
      # - dns01:
      #     cloudflare:
      #       email: hostmaster@devops.coop
      #       apiTokenSecretRef:
      #         name: cloudflare-apikey-secret
      #         key: apikey


      # Porkbun DNS-01 (via cert-manager-webhook-porkbun).
      # Required for wildcard certificates and to avoid exposing port 80 for HTTP-01.
      # https://github.com/pabloa/cert-manager-webhook-porkbun
      # - dns01:
      #     webhook:
      #       groupName: cert-manager-webhook-porkbun.pabloa.dev
      #       solverName: porkbun
      #       config:
      #         apiKey:
      #           name: porkbun-secret
      #           key: PORKBUN_API_KEY
      #         secretApiKey:
      #           name: porkbun-secret
      #           key: PORKBUN_SECRET_API_KEY
