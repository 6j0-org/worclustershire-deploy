# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
spec:
  # HelmRepository example
  # chart:
  #   spec:
  #     chart: cnpg
  #     version: 0.0.0
  #     sourceRef:
  #       kind: HelmRepository
  #       name: prometheus-community

  # OCIRepository example
  # chartRef:
  #   kind: OCIRepository
  #   name: devopscoop-app
  #   # TODO: Is namespace needed?
  #   # namespace: cnpg
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: cnpg-values
    - kind: Secret
      name: cnpg-secrets
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.26.1
      sourceRef:
        kind: HelmRepository
        name: cnpg
