# dyff between <(yq . <(helm show values oci://ghcr.io/immich-app/immich-charts/immich --version 0.12.0)) <(yq eval '. * load("values.yaml")' <(helm show values oci://ghcr.io/immich-app/immich-charts/immich --version 0.12.0))
# vim -O <(helm show values oci://ghcr.io/immich-app/immich-charts/immich --version 0.12.0) values.yaml
controllers:
  main:
    containers:
      main:
        env:
          DB_HOSTNAME:
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: host
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: user
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: password
          DB_DATABASE_NAME:
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: dbname
immich:
  metrics:
    enabled: true
  persistence:
    # Main data store for all photos shared between different components.
    library:
      # Automatically creating the library volume is not supported by this chart
      # You have to specify an existing PVC to use
      existingClaim: immich-library-pvc
  # configuration is immich-config.json converted to yaml
  # ref: https://immich.app/docs/install/config-file/
  #
  configuration:
    # trash:
    #   enabled: false
    #   days: 30
    storageTemplate:
      enabled: true
      template: "{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"
valkey:
  enabled: true
server:
  enabled: true
machine-learning:
  persistence:
    cache:
      # Optional: Set this to persistentVolumeClaim to avoid downloading the ML models every start.
      type: persistentVolumeClaim


# `kubectl get events` will throw a `Warning FailedAttachVolume pod/immich-server-76f6c87764-xgp2g Multi-Attach error for volume "pvc-aee375fc-e287-4380-a29e-1ea850eba23e" Volume is already used by pod(s) immich-server-6c9c88bc7d-6nzgc`
