# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  # HelmRepository example
  # chart:
  #   spec:
  #     chart: immich
  #     version: 0.0.0
  #     sourceRef:
  #       kind: HelmRepository
  #       name: prometheus-community

  # OCIRepository example
  # chartRef:
  #   kind: OCIRepository
  #   name: devopscoop-app
  #   # TODO: Is namespace needed?
  #   # namespace: immich
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: immich-values
    - kind: Secret
      name: immich-secrets
  chartRef:
    kind: OCIRepository
    name: immich-immich
