# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: immich-values
    - kind: Secret
      name: immich-secrets
  chartRef:
    kind: OCIRepository
    name: immich-immich
