# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: garage-values
    - kind: Secret
      name: garage-secrets
  chartRef:
    kind: OCIRepository
    name: garage-garage
