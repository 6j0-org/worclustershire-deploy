# dyff between <(yq . <(helm show values oci://codeberg.org/3uzbcqje/garage/garage:0.9.2)) <(yq eval '. * load("values.yaml")' <(helm show values oci://codeberg.org/3uzbcqje/garage/garage:0.9.2))
# vim -O <(helm show values oci://codeberg.org/3uzbcqje/garage/garage:0.9.2) values.yaml

garage:
  s3:
    api:
      rootDomain: ".s3.garage.6j0.org"
    web:
      rootDomain: ".web.garage.6j0.org"
persistence:
  meta:
    # Using special Longhorn storageClass that doesn't have any replication.
    storageClass: "longhorn-crypto-global-dangerous"
    size: 10000Mi
  data:
    # Using special Longhorn storageClass that doesn't have any replication.
    storageClass: "longhorn-crypto-global-dangerous"
    size: 10000Mi
ingress:
  s3:
    api:
      # Disabled: routing handled by Envoy Gateway HTTPRoute (see garage-httproute.yaml).
      enabled: false
    web:
      # Disabled: routing handled by Envoy Gateway HTTPRoute (see garage-httproute.yaml).
      enabled: false

resources: {}
  # The following are indicative for a small-size deployment, for anything serious double them.
  # limits:
  #   cpu: 100m
  #   memory: 1024Mi
  # requests:
  #   cpu: 100m
  #   memory: 512Mi

monitoring:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
