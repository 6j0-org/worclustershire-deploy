apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harp-nextcloud
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: harp
    app.kubernetes.io/instance: harp-nextcloud
rules:
  - apiGroups: [""]
    resources: ["services", "pods", "secrets", "configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
