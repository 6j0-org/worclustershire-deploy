apiVersion: apps/v1
kind: Deployment
metadata:
  name: harp-nextcloud
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: harp
    app.kubernetes.io/instance: harp-nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harp
      app.kubernetes.io/instance: harp-nextcloud
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harp
        app.kubernetes.io/instance: harp-nextcloud
    spec:
      serviceAccountName: harp-nextcloud
      securityContext:
        fsGroup: 1000
      containers:
        - name: harp
          image: ghcr.io/nextcloud/nextcloud-appapi-harp:release
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8780
              protocol: TCP
            - name: frp
              containerPort: 8782
              protocol: TCP
          env:
            - name: HP_SHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: harp-nextcloud-secret
                  key: shared-key
            - name: NC_INSTANCE_URL
              value: "http://nextcloud.nextcloud.svc.cluster.local"
            - name: HP_K8S_ENABLED
              value: "true"
            - name: HP_K8S_API_SERVER
              value: "https://kubernetes.default.svc"
            - name: HP_K8S_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: harp-nextcloud-sa-token
                  key: token
            - name: HP_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HP_K8S_VERIFY_SSL
              value: "false"
            - name: HP_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
