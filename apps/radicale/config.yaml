apiVersion: v1
data:
  config: |
    [auth]
    type = htpasswd
    htpasswd_encryption = bcrypt

    # Hook binding for event changes and deletion notifications.
    # https://radicale.org/v3.html#hook-1
    # [hook]
    # type = email

    [sharing]
    type = files
    collection_by_token = true
    permit_create_token = true
kind: ConfigMap
metadata:
  name: config
