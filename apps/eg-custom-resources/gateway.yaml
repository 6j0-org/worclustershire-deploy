# https://gateway.envoyproxy.io/docs/tasks/security/tls-cert-manager/#creating-a-tls-gateway-listener
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

    # HTTPS listener for longhorn.6j0.org
    - name: longhorn-6j0-org
      hostname: "longhorn.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: longhorn-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener for immich.6j0.org
    - name: immich-6j0-org
      hostname: "immich.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: immich-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener for grafana.6j0.org
    - name: grafana-6j0-org
      hostname: "grafana.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: grafana-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener for radicale.6j0.org (individual cert via HTTP01)
    - name: radicale-6j0-org
      hostname: "radicale.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: radicale-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener for copyparty.6j0.org
    - name: copyparty-6j0-org
      hostname: "copyparty.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: copyparty-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listeners for garage subdomains
    - name: s3-garage-6j0-org
      hostname: "s3.garage.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: eg-s3-garage-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    - name: wildcard-s3-garage-6j0-org
      hostname: "*.s3.garage.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: eg-wildcard-s3-garage-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    - name: wildcard-web-garage-6j0-org
      hostname: "*.web.garage.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: eg-wildcard-web-garage-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # Apex 6j0.org is NOT covered by *.6j0.org. Add a listener if/when needed.
    # - name: apex-6j0-org
    #   hostname: 6j0.org
    #   ...

    # HTTPS listener for seafile.6j0.org (individual cert via HTTP01)
    - name: seafile-6j0-org
      hostname: "seafile.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: seafile-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener for nextcloud.6j0.org (individual cert via HTTP01)
    - name: nextcloud-6j0-org
      hostname: "nextcloud.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: nextcloud-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # Non-6j0.org domain — needs its own cert.
    - name: youcandoithealth-com
      hostname: youcandoithealth.com
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: youcandoithealth-com-tls
      allowedRoutes:
        namespaces:
          from: All
