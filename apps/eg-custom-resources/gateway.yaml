# https://github.com/envoyproxy/gateway/releases/download/v1.6.3/quickstart.yaml
# https://gateway.envoyproxy.io/docs/tasks/security/tls-cert-manager/
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: eg-https
      allowedRoutes:
        namespaces:
          from: All
