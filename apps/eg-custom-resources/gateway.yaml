# https://gateway.envoyproxy.io/docs/tasks/security/tls-cert-manager/
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: radicale-6j0-org
      hostname: radicale.6j0.org
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: eg-radicale-6j0-org
      allowedRoutes:
        namespaces:
          from: All
    - name: hatsmith-6j0-org
      hostname: hatsmith.6j0.org
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
