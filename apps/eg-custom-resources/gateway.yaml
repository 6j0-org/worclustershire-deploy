# https://gateway.envoyproxy.io/docs/tasks/security/tls-cert-manager/#creating-a-tls-gateway-listener
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener for radicale.6j0.org (individual cert via HTTP01)
    - name: radicale-6j0-org
      hostname: "radicale.6j0.org"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: radicale-6j0-org-tls
      allowedRoutes:
        namespaces:
          from: All

    # *.6j0.org does NOT match deeper subdomains. Separate wildcards for garage:
    # - name: wildcard-s3-garage-6j0-org
    #   hostname: "*.s3.garage.6j0.org"
    #   protocol: HTTPS
    #   port: 443
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - kind: Secret
    #         name: eg-wildcard-s3-garage-6j0-org
    #   allowedRoutes:
    #     namespaces:
    #       from: All

    # - name: wildcard-web-garage-6j0-org
    #   hostname: "*.web.garage.6j0.org"
    #   protocol: HTTPS
    #   port: 443
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - kind: Secret
    #         name: eg-wildcard-web-garage-6j0-org
    #   allowedRoutes:
    #     namespaces:
    #       from: All

    # Apex 6j0.org is NOT covered by *.6j0.org. Add a listener if/when needed.
    # - name: apex-6j0-org
    #   hostname: 6j0.org
    #   ...

    # Non-6j0.org domain — needs its own cert.
    - name: youcandoithealth-com
      hostname: youcandoithealth.com
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: youcandoithealth-com-tls
      allowedRoutes:
        namespaces:
          from: All
