        namespaces:
          from: All
    - name: prometheus-6j0-org
      hostname: prometheus.6j0.org
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: eg-prometheus-6j0-org
      allowedRoutes:
        namespaces:
          from: All
    - name: longhorn-6j0-org
      hostname: longhorn.6j0.org
