          from: All
    - name: alertmanager-6j0-org
      hostname: alertmanager.6j0.org
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: eg-alertmanager-6j0-org
