# https://gateway.envoyproxy.io/docs/tasks/traffic/http-redirect/#force-http--https-redirect
# Catch-all HTTP→HTTPS redirect. No hostnames means any HTTP request is redirected.
# Must be in the same namespace as the Gateway (envoy-gateway-system) because the
# HTTP listener only accepts routes from that namespace (allowedRoutes.namespaces.from: Same).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tls-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: eg
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
