# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seafile-mariadb
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: seafile-mariadb-values
    - kind: Secret
      name: seafile-mariadb-secrets
  chartRef:
    kind: OCIRepository
    name: bitnami-mariadb
