workloadType: "StatefulSet"

statefulSet:
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

replicaCount: 1

image:
  repository: diocrafts/oxicloud
  tag: "0.5.6"

# The container's entrypoint expects to chown /app/storage before dropping to uid 1001.
# A root initContainer handles the chown so the main container can stay non-root.
podSecurityContext:
  fsGroup: 1001

initContainers:
  - name: fix-storage-perms
    image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    command: ["chown", "-R", "1001:1001", "/app/storage"]
    securityContext:
      runAsUser: 0
    volumeMounts:
      - name: data
        mountPath: "/app/storage"

securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true

service:
  port: 8086

httpRoute:
  enabled: true
  parentRefs:
  - name: eg
    namespace: envoy-gateway-system
  hostnames:
  - oxicloud.6j0.org
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

envConfigMap:
  OXICLOUD_SERVER_HOST: "0.0.0.0"
  OXICLOUD_SERVER_PORT: "8086"
  OXICLOUD_BASE_URL: "https://oxicloud.6j0.org"
  OXICLOUD_STORAGE_PATH: "/app/storage"
  OXICLOUD_ENABLE_AUTH: "true"
  OXICLOUD_ENABLE_FILE_SHARING: "true"
  OXICLOUD_ENABLE_TRASH: "true"
  OXICLOUD_ENABLE_SEARCH: "true"
  OXICLOUD_ENABLE_MUSIC: "true"
  MIMALLOC_PURGE_DELAY: "0"
  MIMALLOC_ALLOW_LARGE_OS_PAGES: "0"

envSecret:
  OXICLOUD_DB_CONNECTION_STRING: ""

startupProbe:
  httpGet:
    path: /health
    port: http
livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

volumes:
  - name: data
volumeMounts:
  - name: data
    mountPath: "/app/storage"

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
