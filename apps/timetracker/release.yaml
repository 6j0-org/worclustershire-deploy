# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: timetracker
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: timetracker-values
    - kind: Secret
      name: timetracker-secrets
  chartRef:
    kind: OCIRepository
    name: devopscoop-app
