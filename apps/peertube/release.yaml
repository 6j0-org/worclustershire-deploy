# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: peertube
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: peertube-values
    - kind: Secret
      name: peertube-secrets
  chart:
    spec:
      chart: peertube
      version: 1.7.5
      sourceRef:
        kind: HelmRepository
        name: ananace-charts
