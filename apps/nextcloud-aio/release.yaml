# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-aio
spec:
  # HelmRepository example
  # chart:
  #   spec:
  #     chart: nextcloud-aio
  #     version: 0.0.0
  #     sourceRef:
  #       kind: HelmRepository
  #       name: prometheus-community

  # OCIRepository example
  # chartRef:
  #   kind: OCIRepository
  #   name: devopscoop-app
  #   # TODO: Is namespace needed?
  #   # namespace: nextcloud-aio
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: nextcloud-aio-values
    - kind: Secret
      name: nextcloud-aio-secrets
  chart:
    spec:
      chart: nextcloud-aio-helm-chart
      version: 12.2.1
      sourceRef:
        kind: HelmRepository
        name: nextcloud-aio
