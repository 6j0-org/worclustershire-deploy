# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-aio
spec:
  interval: 10m
  timeout: 30m
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: nextcloud-aio-values
    - kind: Secret
      name: nextcloud-aio-secrets
  chart:
    spec:
      chart: nextcloud-aio-helm-chart
      version: 13.0.4
      sourceRef:
        kind: HelmRepository
        name: nextcloud-aio
