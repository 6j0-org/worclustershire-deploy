# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey-nextcloud
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: valkey-nextcloud-values
    - kind: Secret
      name: valkey-nextcloud-secrets
  chartRef:
    kind: OCIRepository
    name: valkey-valkey
