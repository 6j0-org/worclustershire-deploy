# dyff between <(yq . <(helm show values oci://registry.gitlab.com/devopscoop/charts/app --version 0.8.2)) <(yq eval '. * load("values.yaml")' <(helm show values oci://registry.gitlab.com/devopscoop/charts/app --version 0.8.2))
# vim -O <(helm show values oci://registry.gitlab.com/devopscoop/charts/app --version 0.8.2) values.yaml
replicaCount: 1
image:
  repository: ghcr.io/andreajtucker/chorechart
  tag: dev-dd6c3e1-1779414888 # {"$imagepolicy": "flux-system:chorechart:tag"}
service:
  port: 3001
httpRoute:
  enabled: true
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - chorechart.6j0.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: chorechart-db-app
        key: uri
