replicaCount: 1

image:
  repository: ghcr.io/andreajtucker/chorechart
  tag: latest # {"$imagepolicy": "flux-system:chorechart:tag"}

service:
  port: 3001

httpRoute:
  enabled: true
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - chorechart.6j0.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: chorechart-db-app
        key: uri
