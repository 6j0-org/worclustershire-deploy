# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hatsmith
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: hatsmith-values
    - kind: Secret
      name: hatsmith-secrets
  chartRef:
    kind: OCIRepository
    name: devopscoop-app
