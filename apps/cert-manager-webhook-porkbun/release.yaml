apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-porkbun
spec:
  # Webhook MUST run in the same namespace as cert-manager (uses cert-manager's
  # internal ServiceAccount and CA bundle for the apiservice).
  targetNamespace: cert-manager
  interval: 10m
  chart:
    spec:
      chart: cert-manager-webhook-porkbun
      version: ">=1.4.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager-webhook-porkbun
  valuesFrom:
    - kind: ConfigMap
      name: cert-manager-webhook-porkbun-values
