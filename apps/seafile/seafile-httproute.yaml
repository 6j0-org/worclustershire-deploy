apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seafile
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - seafile.6j0.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: seafile
          port: 80
