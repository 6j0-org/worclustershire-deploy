# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seafile
spec:
  interval: 10m
  timeout: 30m
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: seafile-values
    - kind: Secret
      name: seafile-secrets
  chart:
    spec:
      chart: ce
      version: 13.0.3
      sourceRef:
        kind: HelmRepository
        name: seafile
