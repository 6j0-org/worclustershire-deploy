#   env:
#     - name: CF_API_TOKEN
#       valueFrom:
#         secretKeyRef:
#           name: cloudflare-api-key
#           key: apiKey


# Porkbun webhook provider
# https://github.com/konnektr-io/external-dns-porkbun-webhook
provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/konnektr-io/external-dns-porkbun-webhook
      tag: v0.2.19
    securityContext:
      runAsNonRoot: false
    env:
      - name: API_KEY
        valueFrom:
          secretKeyRef:
            name: porkbun-secret
            key: PORKBUN_API_KEY
      - name: API_SECRET
        valueFrom:
          secretKeyRef:
            name: porkbun-secret
            key: PORKBUN_SECRET_API_KEY

resources:
  requests:
    cpu: 32m
    memory: 100Mi
  limits:
    # Can't explicitly set this to null, because the helm chart is a little overengineered...
    # "resources.limits.cpu: Invalid type. Expected: string, given: null"
    memory: 100Mi
