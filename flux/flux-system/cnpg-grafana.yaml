apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-grafana
  namespace: flux-system
spec:
  dependsOn:
    - name: kube-prometheus-stack
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: apps/cnpg-grafana
  prune: true
  wait: true
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  suspend: false
