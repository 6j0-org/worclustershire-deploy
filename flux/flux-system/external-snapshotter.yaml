---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: external-snapshotter
  namespace: flux-system
spec:
  interval: 60m
  ref:
    tag: v8.6.0
  url: https://github.com/kubernetes-csi/external-snapshotter
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-snapshotter-crds
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: external-snapshotter
  path: /client/config/crd
  prune: true
  wait: true
  timeout: 5m0s
  suspend: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-snapshotter-snapshot-controller
  namespace: flux-system
spec:
  dependsOn:
    - name: external-snapshotter-crds
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: external-snapshotter
  path: /deploy/kubernetes/snapshot-controller
  prune: true
  wait: true
  timeout: 5m0s
  suspend: false
